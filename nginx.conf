# ── Rate Limiting ─────────────────────────────────────────────────────────────
# Zona auth: 20 req/min → un humano rara vez pasa de 3-4 intentos de login seguidos
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

# Zona API general: 120 req/min → 2 req/segundo, más que suficiente para uso normal
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/m;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Devuelve 429 Too Many Requests en lugar del genérico 503
    limit_req_status 429;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Auth: tolerante a ráfagas cortas (ej: doble-click accidental del usuario)
    location ~ ^/api/auth/(login|register)$ {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass http://fullstack-baken-t8b9t3:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API general: muy permisivo, solo corta scraping/bots agresivos
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://fullstack-baken-t8b9t3:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}